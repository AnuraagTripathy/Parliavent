name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Build-time placeholders only — no external service is contacted during
      # lint/test/build. Real values live in the deployment environment.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      NEXT_PUBLIC_HEXCLAVE_PROJECT_ID: dd812125-ddba-468b-b08f-d1226e6137dd
      NEXT_PUBLIC_HEXCLAVE_API_URL: https://api.stack-auth.com
      HEXCLAVE_PROJECT_ID: dd812125-ddba-468b-b08f-d1226e6137dd
      HEXCLAVE_API_URL: https://api.stack-auth.com
      HEXCLAVE_SECRET_SERVER_KEY: ssk_placeholder_for_ci_build_only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
